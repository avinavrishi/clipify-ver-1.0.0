services:
  frontend:
    build:
      context: ./frontend/clipify
      dockerfile: ../../frontend.Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/clipify:/app
      - /app/node_modules
    env_file:
      - .env.frontend

  backend:
    build:
      context: ./backend/bims-BE
      dockerfile: ../../backend.Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/bims-BE:/app
    env_file:
      - .env

  worker:
    build:
      context: ./backend/bims-BE
      dockerfile: ../../backend.Dockerfile
    command: python worker/main.py
    env_file:
      - .env
    depends_on:
      - rabbitmq

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
